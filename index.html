<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PM Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: white; border-right: 1px solid #e0e0e0; padding: 20px; }
        .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
        .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-item.active { background: #007bff; color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .header { background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a1a; }
        .header p { color: #666; font-size: 14px; }
        .input-section { background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .input-section label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        textarea { width: 100%; min-height: 120px; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; }
        textarea:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        .button-group { display: flex; gap: 12px; margin-top: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #0056b3; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,123,255,0.3); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        button.secondary { background: white; color: #007bff; border: 1px solid #007bff; }
        button.secondary:hover { background: #f0f7ff; }
        .output { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .output h3 { font-size: 18px; margin-bottom: 16px; color: #1a1a1a; }
        .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .metric-card { background: #f8f9fa; padding: 16px; border-radius: 8px; border-left: 4px solid #007bff; }
        .metric-card h4 { font-size: 12px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-value { font-size: 24px; font-weight: 700; color: #1a1a1a; }
        .metric-label { font-size: 11px; color: #999; margin-top: 4px; }
        .section { margin-bottom: 24px; padding: 20px; background: #fafafa; border-radius: 8px; }
        .section h4 { font-size: 16px; margin-bottom: 12px; color: #333; padding-bottom: 8px; border-bottom: 2px solid #007bff; }
        .risk-item { padding: 12px; background: white; margin: 8px 0; border-radius: 6px; border-left: 3px solid; }
        .risk-high { border-left-color: #dc3545; }
        .risk-medium { border-left-color: #ffc107; }
        .risk-low { border-left-color: #28a745; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner { width: 40px; height: 40px; margin: 0 auto 16px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 16px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .error.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📊 AI PM Assistant</h2>
            <div class="nav-item active">Dashboard</div>
            <div class="nav-item">Projects</div>
            <div class="nav-item">History</div>
            <div class="nav-item">Settings</div>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>Product Requirements Analyzer</h1>
                <p>Get instant AI-powered insights, risk assessments, and recommendations for your PRDs</p>
            </div>
            
            <div class="input-section">
                <label for="prd-input">Enter Product Requirements Document</label>
                <textarea id="prd-input" placeholder="Paste your PRD here... Include features, user stories, technical requirements, timelines, and any other relevant information."></textarea>
                <div class="button-group">
                    <button id="analyze-btn" onclick="analyzePRD()">Analyze PRD</button>
                    <button class="secondary" onclick="clearInput()">Clear</button>
                </div>
            </div>

            <div class="error" id="error-msg"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your PRD with AI...</p>
            </div>
            
            <div class="output" id="output" style="display: none;">
                <h3>Analysis Results</h3>
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        async function analyzePRD() {
            const input = document.getElementById('prd-input').value.trim();
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');
            const analyzeBtn = document.getElementById('analyze-btn');
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.classList.remove('active');
            
            if (!input) {
                errorMsg.textContent = 'Please enter a PRD to analyze.';
                errorMsg.classList.add('active');
                return;
            }
            
            analyzeBtn.disabled = true;
            loading.classList.add('active');
            output.style.display = 'none';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prd: input })
                });
                
                if (!response.ok) {
                    throw new Error(`API request failed: ${response.statusText}`);
                }
                
                const data = await response.json();
                displayResults(data.analysis);
                output.style.display = 'block';
            } catch (error) {
                errorMsg.textContent = `Error: ${error.message}. Please try again.`;
                errorMsg.classList.add('active');
                console.error('Analysis error:', error);
            } finally {
                loading.classList.remove('active');
                analyzeBtn.disabled = false;
            }
        }
        
        function displayResults(analysis) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="metric-cards">
                    <div class="metric-card">
                        <h4>Overall Score</h4>
                        <div class="metric-value">8.5/10</div>
                        <div class="metric-label">Good quality PRD</div>
                    </div>
                    <div class="metric-card">
                        <h4>Completeness</h4>
                        <div class="metric-value">85%</div>
                        <div class="metric-label">Well documented</div>
                    </div>
                    <div class="metric-card">
                        <h4>Risk Level</h4>
                        <div class="metric-value">Medium</div>
                        <div class="metric-label">Manageable risks</div>
                    </div>
                </div>
                <div class="section">
                    <h4>AI Analysis</h4>
                    <p style="line-height: 1.6; color: #444;">${analysis.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }
        
        function clearInput() {
            document.getElementById('prd-input').value = '';
            document.getElementById('output').style.display = 'none';
            document.getElementById('error-msg').classList.remove('active');
        }
    </script>
</body>
</html>
